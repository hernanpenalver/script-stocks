name: Stock Scanner

on:
  schedule:
    # Run 1 - 10:30 AM ET (1h after market open)
    # EDT (UTC-4, Mar-Nov): 14:30 UTC
    # EST (UTC-5, Nov-Mar): 15:30 UTC  (1h off, acceptable)
    - cron: '30 14 * * 1-5'

    # Run 2 - 3:00 PM ET (1h before market close)
    # EDT (UTC-4, Mar-Nov): 19:00 UTC
    # EST (UTC-5, Nov-Mar): 20:00 UTC  (1h off, acceptable)
    - cron: '0 19 * * 1-5'

  # Manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run stock scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py
